        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete document
