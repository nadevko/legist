        name: file
        required: true
        type: file
      - description: Forward to /documents/:id/files
        in: formData
        name: document_id
        type: string
      - description: AKN subtype
        in: formData
        name: subtype
        type: string
      - description: Document number
        in: formData
        name: number
        type: string
      - description: Issuing body
        in: formData
        name: author
        type: string
      - description: Adoption date YYYY-MM-DD
        in: formData
        name: date
        type: string
      - description: 'Country code (default: by)'
        in: formData
        name: country
        type: string
      - description: Short title
        in: formData
        name: name
        type: string
      - description: Amendment date YYYY-MM-DD
        in: formData
        name: version_date
        type: string
