securityDefinitions:
  BearerAuth:
    description: 'Enter token in format: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
tags:
- description: Registration, login, access-token refresh, logout, listing active sessions,
    and password-reset token flows.
  name: Sessions
- description: 'User profiles: read and update your email, delete your account. Admins
    may read any user and assign `role` via PATCH.'
  name: Users
- description: 'AKN Work-level documents: create, list, get, patch, delete; add and
    list file versions under `/documents/:id/files`.'
  name: Documents
- description: 'File versions at `/files`: upload, list, get (JSON, legistoso, binary,
    SSE), patch expression-level metadata, delete.'
  name: Files
- description: 'Compare two versions of the same document: multipart job creation,
    list, get, and SSE for async progress.'
  name: Diffs
- description: Register webhook endpoints, choose events, inspect signed delivery
    history, enable or disable endpoints.
  name: Webhooks
- description: RAG-based Q&A over legal corpora (stub).
  name: Chat
- description: Liveness and routing helpers (e.g. health).
  name: System
