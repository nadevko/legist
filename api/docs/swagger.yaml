host: legist.nadevko.cc
info:
  contact: {}
  description: |-
    AI assistant for comparing revisions of normative legal acts (НПА) of the Republic of Belarus.

    ## Authentication
    All endpoints except public auth routes require a Bearer token in the `Authorization` header.
    Obtain tokens via `POST /sessions`. Refresh via `POST /tokens/refresh`.

    ## Request IDs
    Every response includes a `Request-Id` header for debugging.

    ## Idempotency
    `POST` requests require an `Idempotency-Key` header.
    Repeating a request with the same key returns the cached response.
    Keys expire after 24 hours. Reusing a key for a different endpoint returns 422.

    ## Roles
    Users have `role`: `user` or `admin` (in `users` table and JWT `role` claim).
    Only `admin` may change another user's role via `PATCH /users/:id`.
    In dev (`ENV=dev`), new registrations default to `admin`; otherwise default is `user`.

    ## Ownership and access control
    Resources belong to the authenticated user. Attempting to read or mutate
    another user's private resource returns 404 (not 403) to avoid leaking existence.
    Public resources (`user_id IS NULL`) are readable by any authenticated user but cannot be mutated.
    List `owner` query (Stripe-like): omit → non-admin sees only own rows; admin sees own + public.
    `owner=null` or `owner=public` (aliases, admin only) → public rows only. `owner=<your user id>` → own rows only. Other ids are rejected.

    ## Pagination
    List endpoints support cursor-based pagination via `starting_after` and `ending_before`.
    Default limit is 20, max 100. Response includes `has_more: true` if more items exist.

    ## Expanding objects
    Pass `expand[]=document` (or other resource name) to expand related objects inline.

    ## Content negotiation
    Use the `Accept` header to control response format:
    - `application/json` — JSON metadata (default)
    - `application/legistoso` — parsed document structure and AKN metadata (when file status is `done`)
    with `sections[].chunks[]` (chunk text + rune offsets in canonical plain text)
    - `text/event-stream` — SSE stream (async progress or sync upload)
    - `application/pdf`, `application/vnd...docx` — file download

    ## Documents and files
    A **Document** is the AKN Work-level entity — it identifies one НПА across all its versions.
    A **File** is one physical version (редакция) of a Document.
    Uploading via `POST /files` creates a new Document automatically.
    Uploading via `POST /documents/:id/files` adds a version to an existing Document.
    `GET /files?document_id=:id` is an alias for `GET /documents/:id/files`.
    `POST /files` with `document_id` form field is an alias for `POST /documents/:id/files`.

    ## File processing pipeline
    Files are parsed asynchronously after upload. Track progress via:
    1. **Sync SSE** — `POST /files` with `Accept: text/event-stream`
    2. **Async SSE** — `GET /files/:id` with `Accept: text/event-stream`
    3. **Parsed result** — `GET /files/:id` with `Accept: application/legistoso` (available when status=done)
    4. **Webhooks** — register an endpoint, receive `file.parsed` or `file.failed` events

    ## Diffs
    `POST /diffs` (multipart, `Idempotency-Key`) compares two file versions. Modes: **`left_file_id` + `right_file_id`**
    (existing files, same document, both parsed); **one of those ids + `file`** (upload the other side); **`file_left` + `file_right`**
    (upload both, new document; optional Work metadata fields). JSON response is minimal (`object: diff`, ids, `status`, `similarity_percent` when done).
    Use `expand[]=document`, `left_file`, `right_file` on list/get. `Accept: text/event-stream` on create or get streams until `diff_done` or `diff_failed`.

    ### SSE progress stages
    | Stage | Description |
    |-------|-------------|
    | `parsing_started` | Document structure parsing in progress |
    | `llm_requested` | Metadata extraction starts as soon as first N chars are available |
    | `llm_skipped` | All metadata was provided explicitly, LLM not needed |
    | `llm_done` | LLM responded; `meta_score` and `meta_ok` fields present |
    | `saving` | Writing plain and legistoso artifacts to disk |
    | `done` | Processing complete |
    | `failed` | Processing failed; `error` and `missing_fields` present |

    ## AKN metadata
    Metadata follows Akoma Ntoso conventions. Work-level fields (`subtype`, `number`,
    `author`, `date`) are stored on the Document and are required for diff.
    Expression-level fields (`version_date`, `version_label`, `language`, `pub_*`)
    are stored on the File and are optional. If not supplied explicitly, the LLM
    attempts to extract them from the document text. After upload, expression-level
    fields can be corrected via `PATCH /files/:id`.

    ## Webhooks
    Register endpoints via `POST /webhooks`. Each delivery is signed with HMAC-SHA256.
    Verify the `Legist-Signature: sha256=...` header using your endpoint secret.
    Failed deliveries are retried up to 3 times with exponential backoff (1s, 4s).
    Inspect delivery history via `GET /webhooks/:id/events`.
    Enable or disable an endpoint via `PATCH /webhooks/:id` with `{"enabled": false}`.

    ### Supported webhook events
    | Event | Description |
    |-------|-------------|
    | `file.created` | File uploaded |
    | `file.parsed` | Parsing and metadata extraction succeeded |
    | `file.failed` | Parsing or metadata extraction failed |
    | `file.deleted` | File deleted |
    | `diff.created` | Diff job started |
    | `diff.done` | Diff completed |
    | `diff.failed` | Diff failed |
    | `user.created` | User registered |
    | `user.deleted` | User deleted |

    ### Signature verification (Go example)
    ```go
    mac := hmac.New(sha256.New, []byte(secret))
    mac.Write(body)
    expected := "sha256=" + hex.EncodeToString(mac.Sum(nil))
    ok := hmac.Equal([]byte(expected), []byte(signature))
    ```
  title: Legist API
  version: v1-alpha
paths:
  /chat:
    post:
      consumes:
      - application/json
      parameters:
      - description: Question
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.chatRequest'
      - description: application/json | text/event-stream
        in: header
        name: Accept
        type: string
      produces:
      - application/json
      - text/event-stream
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.chatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: Ask a question about laws (RAG-based Q&A)
      tags:
      - Chat
  /diffs:
    get:
      parameters:
      - description: Filter by document
        in: query
        name: document_id
        type: string
      - description: Filter by left or right file
        in: query
        name: file_id
        type: string
      - description: pending|processing|done|failed
        in: query
        name: status
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Cursor
        in: query
        name: starting_after
        type: string
      - description: Cursor
        in: query
        name: ending_before
        type: string
      - collectionFormat: csv
        description: 'Expand: document, left_file, right_file'
        in: query
        items:
          type: string
        name: expand[]
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.listResponse-api_diffResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: List diffs for the current user
      tags:
      - Diffs
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: 'With right_file_id: compare two existing files'
        in: formData
        name: left_file_id
        type: string
      - description: 'With left_file_id: compare two existing files'
        in: formData
        name: right_file_id
        type: string
      - description: 'With left_file_id or right_file_id: new version to compare'
        in: formData
        name: file
        type: file
      - description: 'With file_right: create document and compare'
        in: formData
        name: file_left
        type: file
      - description: 'With file_left: create document and compare'
        in: formData
        name: file_right
        type: file
      - description: Work metadata when creating document (two files)
        in: formData
        name: subtype
        type: string
      - description: Work metadata
        in: formData
        name: number
        type: string
      - description: Work metadata
        in: formData
        name: author
        type: string
      - description: Work metadata
        in: formData
        name: date
        type: string
      - description: Work metadata
        in: formData
        name: country
        type: string
      - description: Work metadata
        in: formData
        name: name
        type: string
      - description: application/json | text/event-stream
        in: header
        name: Accept
        type: string
      - description: Idempotency key
        in: header
        name: Idempotency-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.diffResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: 'Create a diff (multipart: two file IDs, ID + file, or two files)'
      tags:
      - Diffs
  /diffs/{id}:
    get:
      parameters:
      - description: Diff ID
        in: path
        name: id
        required: true
        type: string
      - collectionFormat: csv
        description: 'Expand: document, left_file, right_file'
        in: query
        items:
          type: string
        name: expand[]
        type: array
      - description: application/json | text/event-stream
        in: header
        name: Accept
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.diffResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: Get diff by ID or stream pipeline (SSE)
      tags:
      - Diffs
  /documents:
    get:
      parameters:
      - description: 'omit: own (user) or own+public (admin); null|public=public only
