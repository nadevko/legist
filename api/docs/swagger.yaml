info:
  contact: {}
paths:
  /chat:
    post:
      consumes:
      - application/json
      parameters:
      - description: Question
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.chatRequest'
      - description: application/json | text/event-stream
        in: header
        name: Accept
        type: string
      produces:
      - application/json
      - text/event-stream
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.chatResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: Ask a question about laws (RAG-based Q&A)
      tags:
      - Chat
  /diffs:
    get:
      parameters:
      - description: Filter by document
        in: query
        name: document_id
        type: string
      - description: Filter by left or right file
        in: query
        name: file_id
        type: string
      - description: pending|processing|done|failed
        in: query
        name: status
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Cursor
        in: query
        name: starting_after
        type: string
      - description: Cursor
        in: query
        name: ending_before
        type: string
      - collectionFormat: csv
        description: 'Expand: document, left_file, right_file'
        in: query
        items:
          type: string
        name: expand[]
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.listResponse-api_diffResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: List diffs for the current user
      tags:
      - Diffs
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: 'With right_file_id: compare two existing files'
        in: formData
        name: left_file_id
        type: string
      - description: 'With left_file_id: compare two existing files'
        in: formData
        name: right_file_id
        type: string
      - description: 'With left_file_id or right_file_id: new version to compare'
        in: formData
        name: file
        type: file
      - description: 'With file_right: create document and compare'
        in: formData
        name: file_left
        type: file
      - description: 'With file_left: create document and compare'
        in: formData
        name: file_right
        type: file
      - description: Work metadata when creating document (two files)
        in: formData
        name: subtype
        type: string
      - description: Work metadata
        in: formData
        name: number
        type: string
      - description: Work metadata
        in: formData
        name: author
        type: string
      - description: Work metadata
        in: formData
        name: date
        type: string
      - description: Work metadata
        in: formData
        name: country
        type: string
      - description: Work metadata
        in: formData
        name: name
        type: string
      - description: Hard threshold for diff chunk matching (admin only; default from
          DIFF_MATCH_THRESHOLD_LOW)
        in: formData
        name: match_threshold_low
        type: number
      - description: Soft threshold for diff chunk matching (admin only; default from
          DIFF_MATCH_THRESHOLD_HIGH)
        in: formData
        name: match_threshold_high
        type: number
      - description: application/json | text/event-stream
        in: header
        name: Accept
        type: string
      - description: Idempotency key
        in: header
        name: Idempotency-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.diffResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: 'Create a diff (multipart: two file IDs, ID + file, or two files)'
      tags:
      - Diffs
  /diffs/{id}:
    get:
      parameters:
      - description: Diff ID
        in: path
        name: id
        required: true
        type: string
      - collectionFormat: csv
        description: 'Expand: document, left_file, right_file'
        in: query
        items:
          type: string
        name: expand[]
        type: array
      - description: application/json | text/event-stream
        in: header
        name: Accept
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.diffResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: Get diff by ID or stream pipeline (SSE)
      tags:
      - Diffs
  /documents:
    get:
      parameters:
      - description: 'omit: own (user) or own+public (admin); null|public=public only
          (admin); or your user id'
        in: query
        name: owner
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Cursor
        in: query
        name: starting_after
        type: string
      - description: Cursor
        in: query
        name: ending_before
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.listResponse-api_documentResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: List documents
      tags:
      - Documents
    post:
      consumes:
      - application/json
      parameters:
      - description: Document fields (all optional)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.documentRequest'
      - description: Idempotency key
        in: header
        name: Idempotency-Key
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.documentResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "409":
          description: Duplicate subtype+number+date
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a document
      tags:
      - Documents
  /documents/{id}:
    delete:
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      - description: Idempotency key
        in: header
        name: Idempotency-Key
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.deletedResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete document
      tags:
      - Documents
    get:
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      - collectionFormat: csv
        description: 'Expand: files'
        in: query
        items:
          type: string
        name: expand[]
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.documentResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: Get document
      tags:
      - Documents
    patch:
      consumes:
      - application/json
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.documentRequest'
      - description: Idempotency key
        in: header
        name: Idempotency-Key
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.documentResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: Update document Work-level fields
      tags:
      - Documents
  /documents/{id}/files:
    get:
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      - description: pdf|docx
        in: query
        name: type
        type: string
      - description: pending|processing|done|failed
        in: query
        name: status
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Cursor
        in: query
        name: starting_after
        type: string
      - description: Cursor
        in: query
        name: ending_before
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.listResponse-api_fileResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: List file versions of a document
      tags:
      - Documents
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Document ID
        in: path
        name: id
        required: true
        type: string
      - description: PDF or DOCX
        in: formData
        name: file
        required: true
        type: file
      - description: Amendment date YYYY-MM-DD
        in: formData
        name: version_date
        type: string
      - description: Version number
        in: formData
        name: version_number
        type: string
      - description: Version label
        in: formData
        name: version_label
        type: string
      - description: Language (rus|bel)
        in: formData
        name: language
        type: string
      - description: Publication name
        in: formData
        name: pub_name
        type: string
      - description: Publication date
        in: formData
        name: pub_date
        type: string
      - description: Publication number
        in: formData
        name: pub_number
        type: string
      - description: 'If true: parse lazily (start parsing only when creating a diff).
          Default=false.'
        in: formData
        name: lazy
        type: boolean
      - description: application/json | text/event-stream
        in: header
        name: Accept
        type: string
      - description: Idempotency key
        in: header
        name: Idempotency-Key
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.fileResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload a file as a new version of an existing Document
      tags:
      - Documents
  /files:
    get:
      parameters:
      - description: 'omit: own (user) or own+public (admin); null|public=public only
          (admin); or your user id'
        in: query
        name: owner
        type: string
      - description: Forward to /documents/:id/files
        in: query
        name: document_id
        type: string
      - description: pdf|docx
        in: query
        name: type
        type: string
      - description: pending|processing|done|failed
        in: query
        name: status
        type: string
      - description: Limit (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Cursor
        in: query
        name: starting_after
        type: string
      - description: Cursor
        in: query
        name: ending_before
        type: string
      - collectionFormat: csv
        description: 'Expand: document'
        in: query
        items:
          type: string
        name: expand[]
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.listResponse-api_fileResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.apiErrorResponse'
      security:
      - BearerAuth: []
      summary: List files; if document_id is set, forwards to /documents/:id/files
      tags:
      - Files
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: PDF or DOCX
