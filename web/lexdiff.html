<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>legist — AI-анализ нормативных актов РБ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'Geist Mono','Fira Mono',monospace;
  --white:#ffffff;--bg:#fafafa;--bg2:#f4f4f5;--bg3:#e4e4e7;
  --border:#e4e4e7;--bord2:#d4d4d8;--muted:#71717a;--faint:#a1a1aa;--txt:#09090b;
  --red:#ef4444;--red-bg:#fef2f2;--red-bd:#fecaca;
  --org:#f97316;--org-bg:#fff7ed;--org-bd:#fed7aa;
  --grn:#22c55e;--grn-bg:#f0fdf4;--grn-bd:#bbf7d0;
  --sb-w:200px;--r:6px;--r2:8px;--pill:100px;
  --sh1:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 4px 16px rgba(0,0,0,.10);--sh3:0 12px 40px rgba(0,0,0,.18);
  --t:.14s ease;
}
html,body{height:100%;font-family:var(--font);font-size:13.5px;color:var(--txt);background:var(--bg);overflow:hidden;-webkit-font-smoothing:antialiased}
body{display:flex;margin:0;padding:0}
#app{display:flex;width:100%;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* SIDEBAR */
.sidebar{width:var(--sb-w);min-height:100vh;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;z-index:50;transition:transform .22s ease}
.sb-brand{display:flex;align-items:center;gap:9px;padding:14px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-logo{width:28px;height:28px;background:var(--txt);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.sb-name{display:block;font-size:13px;font-weight:700;line-height:1.2}
.sb-tier{display:block;font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.8px}
.sb-nav{flex:1;padding:8px 8px 4px}
.sb-section{display:block;font-size:10.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.8px;padding:8px 8px 4px}
.sb-group{margin-bottom:1px}
.sb-group-toggle{display:flex;align-items:center;gap:8px;width:100%;padding:6px 8px;border-radius:var(--r);background:none;border:none;font-family:var(--font);font-size:13px;color:var(--muted);cursor:pointer;transition:background var(--t),color var(--t)}
.sb-group-toggle:hover{background:var(--bg2);color:var(--txt)}
.sb-group-toggle svg:first-child{flex-shrink:0;opacity:.6}
.sb-group-toggle:hover svg:first-child{opacity:1}
.sb-arr{margin-left:auto;flex-shrink:0;opacity:.4;transition:transform var(--t)}
.sb-group-toggle:not(.open) .sb-arr{transform:rotate(-90deg)}
.sb-sub{padding-left:22px}
.sb-sub.collapsed{display:none}
.sb-link{display:flex;align-items:center;gap:0;padding:5px 8px;border-radius:var(--r);font-size:12.5px;color:var(--muted);text-decoration:none;cursor:pointer;transition:background var(--t),color var(--t);margin-bottom:1px}
.sb-link:hover{background:var(--bg2);color:var(--txt)}
.sb-link.active{background:var(--bg2);color:var(--txt);font-weight:500}
.sb-badge{margin-left:auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--pill);font-size:10.5px;font-weight:700;color:var(--muted);padding:1px 6px;flex-shrink:0}
.sb-link.active .sb-badge{background:var(--bord2);color:var(--txt)}
.sb-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--org);margin-left:auto;flex-shrink:0;display:inline-block}
.sb-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--r);font-size:13px;color:var(--muted);text-decoration:none;cursor:pointer;margin-bottom:1px;transition:background var(--t),color var(--t)}
.sb-item:hover{background:var(--bg2);color:var(--txt)}
.sb-item svg{opacity:.6;flex-shrink:0}
.sb-item:hover svg{opacity:1}
.sb-muted{color:var(--faint)}
.sb-kbhint{display:flex;align-items:center;gap:6px;padding:7px 12px;margin:2px 8px 4px;border-radius:var(--r);font-size:12px;color:var(--faint);cursor:pointer;transition:background var(--t),color var(--t)}
.sb-kbhint:hover{background:var(--bg2);color:var(--txt)}
.sb-kbhint svg{flex-shrink:0}
.sb-kbd{margin-left:auto;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:10.5px;font-family:var(--mono);color:var(--muted)}
.sb-user{display:flex;align-items:center;gap:8px;padding:10px 12px;border-top:1px solid var(--border);cursor:pointer;flex-shrink:0;transition:background var(--t)}
.sb-user:hover{background:var(--bg2)}
.sb-ava{width:26px;height:26px;border-radius:50%;border:1px solid var(--bord2);background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
.sb-user-info{flex:1}
.sb-uname{display:block;font-size:12.5px;font-weight:500}
.sb-uemail{display:block;font-size:11px;color:var(--faint)}
.sb-uchev{color:var(--faint);flex-shrink:0}

/* MAIN */
.main{flex:1;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.page{flex:1;animation:pg-in .16s ease}
.page.hidden{display:none!important}
@keyframes pg-in{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.page-topnav{display:flex;gap:4px;padding:12px 20px 0}
.topnav-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--r);background:none;border:1px solid transparent;font-family:var(--font);font-size:13px;color:var(--muted);cursor:pointer;transition:background var(--t),border-color var(--t)}
.topnav-btn:hover{background:var(--bg2)}
.topnav-btn.active{border-color:var(--bord2);background:var(--white);color:var(--txt);font-weight:500}

/* SHARED COMPONENTS */
.toolbar{display:flex;align-items:center;gap:8px;padding:12px 20px;flex-wrap:wrap}
.toolbar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.search-box{display:flex;align-items:center;gap:7px;background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px;min-width:200px}
.search-box.sm{min-width:160px}
.search-box svg{flex-shrink:0;color:var(--faint)}
.search-box:focus-within{border-color:var(--bord2)}
.search-input{border:none;outline:none;background:transparent;font-family:var(--font);font-size:13px;color:var(--txt);width:100%}
.search-input::placeholder{color:var(--faint)}
.filter-chips{display:flex;gap:5px;flex-wrap:wrap}
.fchip{display:inline-flex;align-items:center;gap:5px;background:var(--white);border:1px solid var(--border);border-radius:var(--pill);padding:4px 11px;font-family:var(--font);font-size:12.5px;color:var(--muted);cursor:pointer;white-space:nowrap;transition:background var(--t),border-color var(--t),color var(--t)}
.fchip:hover{border-color:var(--bord2);color:var(--txt)}
.fchip.active{background:var(--txt);border-color:var(--txt);color:#fff}
.rdot{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rdot.r{background:var(--red)}.rdot.o{background:var(--org)}.rdot.g{background:var(--grn)}
.view-switch{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--white)}
.vsw{background:none;border:none;padding:6px 9px;color:var(--faint);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--t),color var(--t)}
.vsw:hover,.vsw.active{background:var(--bg2);color:var(--txt)}
.bdg{display:inline-flex;align-items:center;padding:2px 9px;border-radius:var(--pill);font-size:11.5px;font-weight:600;white-space:nowrap}
.bdg-r{background:var(--red);color:#fff}.bdg-o{background:var(--org);color:#fff}.bdg-g{background:var(--grn);color:#fff}
.btn-dark{display:inline-flex;align-items:center;gap:6px;background:var(--txt);color:#fff;border:none;border-radius:var(--r);padding:7px 14px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:background var(--t)}
.btn-dark:hover{background:#1f1f1f}
.btn-dark.btn-sm{padding:5px 10px;font-size:12px}
.btn-outline{display:inline-flex;align-items:center;gap:6px;background:var(--white);color:var(--txt);border:1px solid var(--border);border-radius:var(--r);padding:7px 14px;font-family:var(--font);font-size:13px;cursor:pointer;white-space:nowrap;transition:background var(--t)}
.btn-outline:hover{background:var(--bg2)}
.btn-danger{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;border:none;border-radius:var(--r);padding:7px 14px;font-family:var(--font);font-size:13px;cursor:pointer;transition:background var(--t)}
.btn-danger:hover{background:#dc2626}
.dots-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--faint);padding:3px 6px;border-radius:var(--r);letter-spacing:1px;transition:background var(--t)}
.dots-btn:hover{background:var(--bg2);color:var(--txt)}

/* PAGE: ACTS */
.acts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:12px;padding:0 20px}
.act-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:16px;cursor:pointer;transition:box-shadow var(--t),border-color var(--t),transform .15s}
.act-card:hover{border-color:var(--bord2);box-shadow:var(--sh1);transform:translateY(-1px)}
.ac-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ac-type{font-size:10px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.7px;background:var(--bg2);border:1px solid var(--border);padding:2px 7px;border-radius:4px}
.ac-vers-pill{font-size:11px;font-weight:600;color:var(--muted);background:var(--bg2);border:1px solid var(--border);padding:2px 8px;border-radius:var(--pill)}
.ac-title{font-size:13.5px;font-weight:600;line-height:1.4;margin-bottom:4px}
.ac-org{font-size:12px;color:var(--muted);margin-bottom:10px}
.ac-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.ac-vers{font-size:12px;color:var(--faint)}
.ac-bar{display:inline-flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:11px;color:var(--muted);gap:5px}
.ac-info-row{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--faint);margin-bottom:12px;flex-wrap:wrap}
.ac-dot{color:var(--bg3);margin:0 1px}
.ac-info-row svg{flex-shrink:0}
.bar-seg{width:12px;height:5px;border-radius:2px}
.bs-r{background:var(--red)}.bs-o{background:var(--org)}.bs-g{background:var(--grn)}.bs-e{background:var(--bg3)}
.ac-date{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--faint)}
.ac-date svg{width:12px;height:12px}
.ac-footer{border-top:1px solid var(--border);padding-top:11px;margin-top:11px;display:flex;align-items:center;justify-content:space-between}
.acts-list{display:flex;flex-direction:column;gap:5px;padding:0 20px}
.act-row{display:flex;align-items:center;gap:14px;background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;cursor:pointer;transition:box-shadow var(--t),border-color var(--t)}
.act-row:hover{border-color:var(--bord2);box-shadow:var(--sh1)}
.ar-type{flex-shrink:0}.ar-title{flex:1;font-weight:600;font-size:13.5px}
.ar-org{width:160px;flex-shrink:0;font-size:12px;color:var(--muted)}
.ar-date{width:100px;flex-shrink:0;font-size:12px;color:var(--faint)}.ar-bdg{flex-shrink:0}
.acts-pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 20px;font-size:12.5px;color:var(--faint)}
.pg-btns{display:flex;gap:4px}
.pg-b{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:4px 9px;font-size:13px;color:var(--muted);cursor:pointer;transition:background var(--t)}
.pg-b:hover{background:var(--bg2)}

/* PAGE: DETAIL */
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;padding:8px 20px 16px;flex-wrap:wrap;gap:10px}
.detail-header-actions{display:flex;gap:8px;align-items:center}
.detail-title{font-size:20px;font-weight:700;margin-bottom:3px}
.detail-sub{font-size:13px;color:var(--muted)}
.versions-tbl{margin:0 20px;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.vtbl-head,.vtbl-row{display:grid;grid-template-columns:34px 70px 110px 140px 90px 80px 110px 36px;align-items:center;gap:10px;padding:10px 16px}
.vtbl-head{background:var(--bg);border-bottom:1px solid var(--border);font-size:11.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.5px}
.vtbl-row{border-bottom:1px solid var(--border);font-size:13px;transition:background var(--t);cursor:pointer}
.vtbl-row:last-child{border-bottom:none}.vtbl-row:hover{background:var(--bg)}.vtbl-ver{font-weight:700}
.vtbl-changes{font-size:12px;color:var(--muted)}
.vtbl-size{font-size:12px;color:var(--faint);font-family:var(--mono)}
.vtbl-status{display:inline-flex;align-items:center;padding:2px 9px;border-radius:var(--pill);font-size:11.5px;font-weight:600}
.status-act{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.status-arch{background:var(--bg2);color:var(--muted);border:1px solid var(--border)}

/* PAGE: UPLOAD */
.upload-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px}
.upload-hero{text-align:center;margin-bottom:36px;max-width:560px}
.upload-h1{font-size:24px;font-weight:700;margin-bottom:10px}
.upload-sub{font-size:13.5px;color:var(--muted);line-height:1.65}
.upload-pair{display:flex;align-items:flex-start;gap:0;width:100%;max-width:780px}
.upload-card{flex:1;background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:22px}
.uc-hdr h3{font-size:15px;font-weight:700;margin-bottom:4px}
.uc-hdr p{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.upload-sep{display:flex;align-items:center;justify-content:center;width:56px;flex-shrink:0;padding-top:72px}
.sep-icon{width:32px;height:32px;border:1px solid var(--border);border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;color:var(--faint)}
.dz{border:1.5px dashed var(--border);border-radius:var(--r);padding:28px 16px;text-align:center;cursor:pointer;transition:border-color var(--t),background var(--t)}
.dz:hover,.dz.over{border-color:var(--txt);background:var(--bg)}
.dz-icon{width:36px;height:36px;border:1px solid var(--border);border-radius:8px;background:var(--white);color:var(--muted);display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.dz-text{font-size:13px;font-weight:500;color:var(--txt);margin-bottom:3px}
.dz-hint{font-size:11.5px;color:var(--faint);margin-bottom:10px}
.dz-btn{display:inline-block;background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:5px 14px;font-family:var(--font);font-size:12.5px;color:var(--txt);cursor:pointer;transition:background var(--t)}
.dz-btn:hover{background:var(--bg2)}
.fp{display:flex;align-items:center;gap:9px;border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;margin-top:11px;background:var(--bg)}
.fp.hidden{display:none!important}
.fp-ico{width:26px;height:26px;border-radius:5px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--muted)}
.fp-name{font-size:12.5px;font-weight:600}.fp-size{font-size:11px;color:var(--faint)}
.fp-rm{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--faint);padding:3px;border-radius:3px;transition:background var(--t)}
.fp-rm:hover{background:var(--bg3);color:var(--txt)}
.btn-compare{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:780px;margin-top:18px;background:var(--txt);color:#fff;border:none;border-radius:var(--r2);padding:12px 24px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:background var(--t)}
.btn-compare:hover{background:#1f1f1f}
.btn-compare:disabled{opacity:.5;cursor:not-allowed}
.progress-wrap{width:100%;max-width:780px;margin-top:24px;background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.progress-label{font-size:13px;font-weight:600;margin-bottom:12px}
.progress-bar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-bottom:16px}
.progress-fill{height:100%;background:var(--txt);border-radius:2px;width:0%;transition:width .4s ease}
.progress-steps{display:flex}
.ps{flex:1;font-size:11px;color:var(--faint);text-align:center;padding:4px 2px;border-top:2px solid var(--bg3);transition:color var(--t),border-color var(--t);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ps.active{color:var(--txt);border-top-color:var(--txt);font-weight:600}
.ps.done{color:var(--grn);border-top-color:var(--grn)}

/* PAGE: COMPARE */
.cmp-header{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 20px 8px;flex-wrap:wrap;gap:10px}
.cmp-header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.cmp-title{font-size:20px;font-weight:700;margin-bottom:3px}
.cmp-sub{font-size:13px;color:var(--muted)}
.tabs-bar{display:flex;border-bottom:1px solid var(--border);padding:0 20px;background:var(--white);overflow-x:auto}
.tab{display:inline-flex;align-items:center;gap:6px;background:none;border:none;padding:10px 16px;font-family:var(--font);font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color var(--t),border-color var(--t);white-space:nowrap}
.tab:hover{color:var(--txt)}.tab.active{color:var(--txt);border-bottom-color:var(--txt);font-weight:500}
.tab-pane{padding:14px 20px}.tab-pane.hidden{display:none!important}
.tbl-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tbl-wrap{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;overflow-x:auto}
.ctbl{width:100%;border-collapse:collapse;min-width:900px}
.ctbl th{background:var(--bg);padding:10px 12px;text-align:left;font-size:11.5px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);white-space:nowrap}
.ctbl th.sortable{cursor:pointer;user-select:none}.ctbl th.sortable:hover{color:var(--txt)}
.si{font-size:10px}
.ctbl td{padding:11px 12px;border-bottom:1px solid var(--border);color:var(--txt);vertical-align:middle}
.ctbl tr:last-child td{border-bottom:none}.ctbl tr:hover td{background:var(--bg)}
.ctbl.dense td{padding:7px 10px}
.td-s{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap}.td-o{color:var(--muted)}.td-n{font-weight:500}
.td-t{font-size:12.5px;color:var(--muted);white-space:nowrap}
.td-m{font-family:var(--mono);font-size:11.5px;color:var(--muted);white-space:nowrap}
.td-r{font-size:12px;color:var(--muted)}
.clip{max-width:155px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.tbl-foot{display:flex;align-items:center;justify-content:space-between;padding:10px 0 0;font-size:12.5px;color:var(--faint)}
.tbl-pg{display:flex;align-items:center;gap:8px}
.pg-sel{border:1px solid var(--border);border-radius:var(--r);padding:3px 7px;font-family:var(--font);font-size:12.5px;background:var(--white);cursor:pointer}

/* VTV */
.vtv-wrap{display:flex;height:calc(100vh - 230px);min-height:400px;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;background:var(--bg)}
.vtv-col{flex:1;display:flex;flex-direction:column;overflow:hidden}
.vtv-col-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0}
.vtv-col-lbl{font-size:12.5px;font-weight:600}.vtv-col-ver{font-size:11.5px;color:var(--faint);font-family:var(--mono)}
.vtv-divider{width:1px;background:var(--border);flex-shrink:0}
.vtv-body{flex:1;overflow-y:auto;padding:22px 26px;font-size:13.5px;line-height:1.9}
.vtv-body h4{font-size:14px;font-weight:700;text-align:center;margin-bottom:16px}
.vtv-body p{margin-bottom:8px}
.vdel{background:#fee2e2;color:#b91c1c;text-decoration:line-through;border-radius:2px;padding:0 2px;cursor:pointer;transition:background var(--t)}
.vdel:hover{background:#fecaca}
.vadd{background:#dcfce7;color:#166534;border-radius:2px;padding:0 2px;cursor:pointer;transition:background var(--t)}
.vadd:hover{background:#bbf7d0}
.vtv-bar{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-top:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);padding:14px 18px}
.vtv-bar.hidden{display:none!important}
.vtv-bar-body{flex:1}.vtv-bar-row{display:flex;gap:32px;margin-bottom:8px;flex-wrap:wrap}
.vbl{display:block;font-size:10.5px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.vbv{display:block;font-size:13px;font-weight:500}
.vtv-bar-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.vb-link{font-size:12px;color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border);transition:color var(--t),border-color var(--t)}
.vb-link:hover{color:var(--txt);border-bottom-color:var(--txt)}

/* CHECK */
.chk-stats{display:flex;gap:12px;margin-bottom:24px}
.chk-card{flex:1;border-radius:var(--r2);padding:18px 20px;text-align:center;border:1px solid}
.chk-r{background:var(--red-bg);border-color:var(--red-bd)}.chk-o{background:var(--org-bg);border-color:var(--org-bd)}.chk-g{background:var(--grn-bg);border-color:var(--grn-bd)}
.chk-num{font-size:34px;font-weight:800;line-height:1;margin-bottom:4px}
.chk-r .chk-num{color:var(--red)}.chk-o .chk-num{color:var(--org)}.chk-g .chk-num{color:var(--grn)}
.chk-lbl{font-size:13px;font-weight:600;margin-bottom:2px}.chk-desc{font-size:11.5px;color:var(--muted)}
.chk-section{font-size:14px;font-weight:700;margin-bottom:12px}
.chk-actions{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}
.hier-list{border-radius:var(--r2);overflow:hidden;border:1px solid var(--border)}
.hier-item{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--white);border-bottom:1px solid var(--border);font-size:13px;transition:background var(--t)}
.hier-item:last-child{border-bottom:none}.hier-item:hover{background:var(--bg)}
.hi-num{font-size:10.5px;font-weight:700;color:var(--faint);width:22px;font-family:var(--mono);flex-shrink:0}
.hi-txt{flex:1;font-weight:500}.hi-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.viol-list{display:flex;flex-direction:column;gap:8px}
.viol-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;border-left:3px solid var(--red);transition:box-shadow var(--t)}
.viol-card:hover{box-shadow:var(--sh1)}.viol-card.warn{border-left-color:var(--org)}
.viol-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.viol-sec{font-family:var(--mono);font-size:11.5px;color:var(--faint)}
.viol-txt{font-size:13px;font-weight:500;line-height:1.5;margin-bottom:5px}
.viol-law{font-size:12px;color:var(--muted)}
.viol-law a{color:var(--txt);text-decoration:underline;text-underline-offset:2px}
.viol-law a:hover{opacity:.7}

/* PAGE: CHAIN */
#page-chain{padding:0 20px 32px}
.chain-header{display:flex;align-items:flex-start;justify-content:space-between;padding:0 0 20px;flex-wrap:wrap;gap:12px}
.chain-title{font-size:20px;font-weight:700;margin-bottom:3px}.chain-sub{font-size:13px;color:var(--muted)}
.chain-stats{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.cstat{display:flex;flex-direction:column;align-items:center;background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:12px 18px;min-width:90px;transition:box-shadow var(--t)}
.cstat:hover{box-shadow:var(--sh1)}
.cstat-n{font-size:20px;font-weight:800;line-height:1.2}.cstat-l{font-size:11.5px;color:var(--muted);margin-top:2px;white-space:nowrap}
.cstat-r .cstat-n{color:var(--red)}.cstat-o .cstat-n{color:var(--org)}.cstat-g .cstat-n{color:var(--grn)}
.chain-body{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.chain-col-title{font-size:14px;font-weight:700;margin-bottom:14px}
.chain-timeline{position:relative;padding-left:28px}
.chain-timeline::before{content:'';position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:var(--border);border-radius:1px}
.ct-item{position:relative;margin-bottom:18px;cursor:pointer}
.ct-item:last-child{margin-bottom:0}
.ct-dot{position:absolute;left:-22px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--white);z-index:1;transition:transform var(--t);box-shadow:0 0 0 2px var(--border)}
.ct-item:hover .ct-dot{transform:scale(1.25)}
.ct-dot-r{background:var(--red)}.ct-dot-o{background:var(--org)}.ct-dot-g{background:var(--grn)}
.ct-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;transition:box-shadow var(--t),border-color var(--t)}
.ct-item:hover .ct-card{box-shadow:var(--sh1);border-color:var(--bord2)}
.ct-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.ct-ver{font-size:11.5px;font-weight:700;color:var(--faint);font-family:var(--mono)}.ct-date{font-size:11.5px;color:var(--faint)}
.ct-title{font-size:13px;font-weight:600;margin-bottom:6px}
.ct-meta{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.ct-changes{font-size:11.5px;color:var(--muted)}
.ct-bars{display:flex;gap:2px}
.ct-seg{height:4px;border-radius:2px}
.ct-author{font-size:11.5px;color:var(--faint);margin-top:6px}
.ct-actions{display:flex;gap:6px;margin-top:9px}
.ct-btn{font-size:11.5px;padding:3px 9px;border-radius:var(--r);background:var(--bg);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:var(--font);transition:background var(--t),color var(--t)}
.ct-btn:hover{background:var(--bg2);color:var(--txt)}
.chain-svg{width:100%;border:1px solid var(--border);border-radius:var(--r);background:var(--bg)}
.chain-legend{display:flex;gap:14px;margin-top:10px;font-size:12px;color:var(--muted)}
.chain-legend span{display:flex;align-items:center;gap:5px}

/* PAGE: ASSISTANT */
.ass-layout{display:flex;height:100vh}
.ass-sidebar{width:180px;flex-shrink:0;border-right:1px solid var(--border);padding:14px 10px;display:flex;flex-direction:column;gap:3px}
.ass-hist-section{font-size:10.5px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.8px;padding:10px 8px 4px}
.ass-hist-item{display:block;padding:6px 9px;border-radius:var(--r);font-size:12.5px;color:var(--muted);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background var(--t),color var(--t)}
.ass-hist-item:hover{background:var(--bg2);color:var(--txt)}.ass-hist-item.active{background:var(--bg2);color:var(--txt);font-weight:500}
.ass-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ass-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.ass-welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.ass-wlc-icon{width:52px;height:52px;background:var(--bg2);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.ass-welcome h2{font-size:18px;font-weight:700;margin-bottom:8px}
.ass-welcome p{font-size:13.5px;color:var(--muted);max-width:420px;line-height:1.6;margin-bottom:22px}
.suggestions{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;max-width:560px}
.sug{background:var(--white);border:1px solid var(--border);border-radius:var(--pill);padding:6px 13px;font-family:var(--font);font-size:12.5px;color:var(--muted);cursor:pointer;transition:all var(--t)}
.sug:hover{border-color:var(--bord2);color:var(--txt);background:var(--bg2)}
.chat-msgs{flex:1;padding:20px 36px;display:flex;flex-direction:column;gap:14px}
.chat-msgs.hidden{display:none!important}
.cm{display:flex;gap:10px;max-width:640px}.cm.user{align-self:flex-end;flex-direction:row-reverse}
.cm-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700}
.cm.ai .cm-av{background:var(--bg2);border:1px solid var(--border);color:var(--muted)}
.cm.user .cm-av{background:var(--txt);color:#fff}
.cm-bub{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13.5px;line-height:1.65}
.cm.ai .cm-bub{border-radius:10px 10px 10px 3px}
.cm.user .cm-bub{background:var(--txt);color:#fff;border-color:var(--txt);border-radius:10px 10px 3px 10px}
.typing{display:flex;gap:4px;padding:4px 0;align-items:center}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--faint);animation:tdot 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.ass-input-bar{border-top:1px solid var(--border);padding:12px 24px 16px;background:var(--white);flex-shrink:0}
.ass-input-meta{display:flex;gap:6px;margin-bottom:8px}
.ass-chip{display:inline-flex;align-items:center;gap:5px;background:none;border:1px solid var(--border);border-radius:var(--pill);padding:3px 10px;font-family:var(--font);font-size:12px;color:var(--muted);cursor:pointer;transition:background var(--t)}
.ass-chip:hover{background:var(--bg2)}
.ass-input-box{display:flex;align-items:flex-end;gap:9px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r2);padding:10px 10px 10px 14px}
.ass-input-box:focus-within{border-color:var(--bord2)}
.ass-ta{flex:1;border:none;outline:none;background:transparent;font-family:var(--font);font-size:13.5px;color:var(--txt);resize:none;max-height:130px;line-height:1.5}
.ass-ta::placeholder{color:var(--faint)}
.ass-send{width:30px;height:30px;flex-shrink:0;background:var(--txt);border:none;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;transition:background var(--t)}
.ass-send:hover{background:#1f1f1f}

/* PAGE: EMPTY */
.empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:60px 24px;text-align:center}
.empty-icon{width:80px;height:80px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;display:flex;align-items:center;justify-content:center;color:var(--faint);margin:0 auto 20px}
.empty-title{font-size:20px;font-weight:700;margin-bottom:10px}
.empty-sub{font-size:14px;color:var(--muted);max-width:420px;line-height:1.65;margin:0 auto 28px}
.empty-features{display:flex;flex-direction:column;gap:14px;max-width:420px;text-align:left;margin-top:8px}
.ef{display:flex;gap:14px;align-items:flex-start}
.ef-icon{width:36px;height:36px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
.ef-title{font-size:13px;font-weight:600;margin-bottom:3px}.ef-desc{font-size:12.5px;color:var(--muted);line-height:1.5}

/* CTX MENU */
.ctx-menu{position:fixed;z-index:9000;background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:4px;box-shadow:var(--sh2);min-width:150px}
.ctx-item{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border:none;border-radius:var(--r);background:none;font-family:var(--font);font-size:13px;color:var(--txt);cursor:pointer;text-align:left;transition:background var(--t)}
.ctx-item:hover{background:var(--bg2)}.ctx-danger{color:var(--red)}.ctx-danger:hover{background:var(--red-bg)}
.ctx-divider{height:1px;background:var(--border);margin:3px 0}

/* MODALS */
.modal-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;animation:mo-in .14s ease}
.modal-overlay.hidden{display:none!important}
@keyframes mo-in{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:var(--r2);padding:24px;width:360px;max-width:94vw;box-shadow:var(--sh3);animation:m-in .14s ease;max-height:90vh;overflow-y:auto}
@keyframes m-in{from{transform:translateY(-10px);opacity:0}to{transform:none;opacity:1}}
.modal-wide{width:500px}.modal-kbd{width:560px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.modal-title{font-size:15px;font-weight:700}.modal-sub{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.modal-text{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.modal-actions{display:flex;justify-content:flex-end;gap:8px}
.modal-close{background:none;border:none;cursor:pointer;color:var(--faint);padding:3px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;transition:background var(--t),color var(--t)}
.modal-close:hover{background:var(--bg2);color:var(--txt)}
.ntsi-quick{border-top:1px solid var(--border);padding-top:12px}
.ntsi-quick-title{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.ntsi-link{display:flex;align-items:center;padding:7px 10px;border-radius:var(--r);font-size:13px;color:var(--txt);text-decoration:none;transition:background var(--t);margin-bottom:2px}
.ntsi-link::after{content:'↗';font-size:11px;color:var(--faint);margin-left:auto}
.ntsi-link:hover{background:var(--bg2)}.ntsi-results{margin-top:14px;border-top:1px solid var(--border);padding-top:12px}
.sc-cols{display:grid;grid-template-columns:1fr 1fr;gap:0 32px}
.sc-group{font-size:10.5px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.6px;padding:10px 0 5px}
.sc-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px}
.sc-row:last-child{border-bottom:none}.sc-keys{display:flex;gap:4px;align-items:center}
kbd{background:var(--bg2);border:1px solid var(--bord2);border-radius:4px;padding:2px 7px;font-family:var(--mono);font-size:11.5px;color:var(--txt);box-shadow:0 1px 0 var(--bord2)}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--txt);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:500;box-shadow:var(--sh3);animation:t-in .18s ease}
.toast.hidden{display:none!important}
@keyframes t-in{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}

/* MOBILE */
.mob-header{display:none}.mob-overlay{display:none}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;z-index:200;transform:translateX(-100%)}
  .sidebar.mob-open{transform:translateX(0);box-shadow:var(--sh3)}
  .mob-header{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--white);position:sticky;top:0;z-index:100;flex-shrink:0}
  .mob-menu-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:var(--r);color:var(--txt);display:flex;align-items:center;justify-content:center}
  .mob-brand{font-size:14px;font-weight:700}.mob-upload-btn{margin-left:auto}
  .mob-overlay{display:block;position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.4)}
  .mob-overlay.hidden{display:none!important}
  .toolbar{padding:10px 14px}
  .acts-grid{grid-template-columns:1fr;padding:0 14px}
  .acts-list{padding:0 14px}.acts-pagination{padding:12px 14px}
  .upload-pair{flex-direction:column}.upload-sep{display:none}.btn-compare{max-width:100%}
  .vtv-wrap{flex-direction:column;height:auto;min-height:300px}
  .vtv-divider{width:100%;height:1px}.vtv-col{min-height:200px}
  .chk-stats{flex-direction:column}
  .vtbl-head,.vtbl-row{grid-template-columns:28px 46px 86px 86px 86px 100px 28px;font-size:12px;padding:8px 12px}
  .chain-body{grid-template-columns:1fr}
  .modal,.modal-wide,.modal-kbd{width:calc(100vw - 32px)}
  .sc-cols{grid-template-columns:1fr}
  .cmp-header{flex-direction:column;gap:10px}
}
.hidden{display:none!important}
input[type="checkbox"]{width:14px;height:14px;accent-color:var(--txt);cursor:pointer}


/* ═══ AUTH ═══ */
.auth-page{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);min-height:100vh}
.auth-wrap{width:380px;max-width:calc(100vw - 32px)}
.auth-logo-row{display:flex;align-items:center;gap:9px;justify-content:center;margin-bottom:28px}
.auth-logo-icon{width:30px;height:30px;background:var(--txt);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0}
.auth-logo-name{font-size:15px;font-weight:700}
.auth-logo-tier{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.8px}
.auth-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:32px}
.auth-heading{font-size:18px;font-weight:700;margin-bottom:4px}
.auth-subheading{font-size:13px;color:var(--muted);margin-bottom:24px}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:22px}
.auth-tab{flex:1;padding:8px 0;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;background:transparent;font-family:var(--font);font-size:13px;color:var(--muted);cursor:pointer;transition:color var(--t),border-color var(--t);font-weight:500}
.auth-tab:hover{color:var(--txt)}
.auth-tab.active{color:var(--txt);border-bottom-color:var(--txt)}
.auth-field{margin-bottom:14px}
.auth-label{display:block;font-size:12.5px;font-weight:500;color:var(--txt);margin-bottom:5px}
.auth-input-wrap{position:relative}
.auth-input{width:100%;background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:8px 36px 8px 10px;font-family:var(--font);font-size:13.5px;color:var(--txt);outline:none;transition:border-color var(--t),box-shadow var(--t);box-sizing:border-box}
.auth-input:focus{border-color:var(--bord2);box-shadow:0 0 0 3px rgba(9,9,11,.06)}
.auth-input.has-error{border-color:var(--red);box-shadow:0 0 0 3px var(--red-bg)}
.auth-input::placeholder{color:var(--faint)}
.auth-input-btn{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;padding:3px;cursor:pointer;color:var(--faint);display:flex;align-items:center;transition:color var(--t)}
.auth-input-btn:hover{color:var(--txt)}
.auth-input-ico{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;display:flex;align-items:center}
.auth-err-msg{font-size:11.5px;color:var(--red);margin-top:4px;display:flex;align-items:center;gap:4px}
.auth-strength{display:flex;gap:3px;margin-top:6px}
.auth-str-seg{flex:1;height:3px;border-radius:2px;background:var(--bg3);transition:background .3s}
.auth-str-seg.str-weak{background:var(--red)}
.auth-str-seg.str-mid{background:var(--org)}
.auth-str-seg.str-strong{background:var(--grn)}
.auth-btn{width:100%;padding:9px 0;background:var(--txt);color:#fff;border:none;border-radius:var(--r);font-family:var(--font);font-size:13.5px;font-weight:600;cursor:pointer;transition:background var(--t);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
.auth-btn:hover:not(:disabled){background:#1f1f1f}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:authSpin .7s linear infinite;flex-shrink:0}
@keyframes authSpin{to{transform:rotate(360deg)}}
.auth-card.is-shaking{animation:authShake .4s ease}
@keyframes authShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-7px)}30%{transform:translateX(7px)}45%{transform:translateX(-4px)}60%{transform:translateX(4px)}80%{transform:translateX(-2px)}}
.auth-switch{text-align:center;font-size:12.5px;color:var(--muted);margin-top:16px}

    <aside class="sidebar" :class="{ 'mob-open': mobSidebarOpen }" id="sidebar">
      <div class="sb-brand">
        <div class="sb-logo">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="12" y2="17"/>
          </svg>
        </div>
        <div class="sb-brand-text">
          <span class="sb-name">legist</span>
          <span class="sb-tier">Enterprise</span>
        </div>
      </div>

      <nav class="sb-nav">
        <span class="sb-section">Platform</span>

        <div class="sb-group">
          <button class="sb-group-toggle" :class="{ open: sgWorkspace }" @click="sgWorkspace = !sgWorkspace">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            Workspace
            <svg class="sb-arr" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg>
          </button>
          <div class="sb-sub" :class="{ collapsed: !sgWorkspace }">
            <a class="sb-link" :class="{ active: page === 'acts' }" href="#" @click.prevent="showPage('acts')">
              Акты <span class="sb-badge">{{ acts.length }}</span>
            </a>
            <a class="sb-link" :class="{ active: page === 'upload' }" href="#" @click.prevent="showPage('upload')">Загрузить акты</a>
            <a class="sb-link" :class="{ active: page === 'chain' }" href="#" @click.prevent="showPage('chain')">Цепочка редакций</a>
            <a class="sb-link" :class="{ active: page === 'assistant' }" href="#" @click.prevent="showPage('assistant')">
              Ассистент <span class="sb-badge-dot"></span>
            </a>
          </div>
        </div>

        <span class="sb-section" style="margin-top:8px">Projects</span>

        <div class="sb-group">
          <button class="sb-group-toggle" :class="{ open: sgProj1 }" @click="sgProj1 = !sgProj1">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="0.5"/><rect x="14" y="3" width="7" height="7" rx="0.5"/><rect x="14" y="14" width="7" height="7" rx="0.5"/><rect x="3" y="14" width="7" height="7" rx="0.5"/></svg>
            Трудовое право
            <svg class="sb-arr" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg>
          </button>
          <div class="sb-sub" :class="{ collapsed: !sgProj1 }">
            <a class="sb-link" href="#" @click.prevent="openActDetailById(1)">ПВТР ООО ТехПром</a>
            <a class="sb-link" href="#" @click.prevent>Положение об ОТ</a>
          </div>
        </div>

        <a class="sb-item" href="#" @click.prevent>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
          Налоговое право
        </a>
        <a class="sb-item" href="#" @click.prevent>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          Административное
        </a>
        <a class="sb-item sb-muted" href="#" @click.prevent>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>
          More
        </a>
      </nav>

      <div class="sb-kbhint" @click="openShortcuts">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M7 16h10"/></svg>
        Горячие клавиши
        <kbd class="sb-kbd">?</kbd>
      </div>

      <div class="sb-user" @click="logOut">
        <div class="sb-ava">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.31 3.58-6 8-6s8 2.69 8 6"/></svg>
        </div>
        <div class="sb-user-info">
          <span class="sb-uname">{{ currentUser.name || 'Пользователь' }}</span>
          <span class="sb-uemail">{{ currentUser.email }}</span>
        </div>
        <svg class="sb-uchev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9,18 15,12 9,6"/></svg>
      </div>
    </aside>

    <!-- ═══════════ MAIN ═══════════ -->
    <main class="main">

      <!-- Мобильный хедер -->
      <div class="mob-header">
        <button class="mob-menu-btn" @click="toggleMobSidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="mob-brand">legist</span>
        <button class="btn-dark btn-sm mob-upload-btn" @click="showPage('upload')">+ Загрузить</button>
      </div>
      <div class="mob-overlay" :class="{ hidden: !mobSidebarOpen }" @click="toggleMobSidebar"></div>

      <!-- ══════ PAGE: ACTS ══════ -->
      <div class="page" :class="{ hidden: page !== 'acts' }">
        <div class="page-topnav">
          <button class="topnav-btn" :class="{ active: page === 'acts' }" @click="showPage('acts')">Акты</button>
          <button class="topnav-btn" :class="{ active: page === 'assistant' }" @click="showPage('assistant')">Ассистент</button>
        </div>

        <div class="toolbar">
          <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="search-input" type="text" placeholder="Поиск по названию, организации..." v-model="actsSearch" @input="onActsSearchInput"/>
          </div>
          <div class="filter-chips">
            <button class="fchip" :class="{ active: actsTypeFilter === 'all' }" @click="filterActsType('all')">Все</button>
            <button class="fchip" :class="{ active: actsTypeFilter === 'ЛНА' }" @click="filterActsType('ЛНА')">ЛНА</button>
            <button class="fchip" :class="{ active: actsTypeFilter === 'НПА' }" @click="filterActsType('НПА')">НПА</button>
          </div>
          <div class="toolbar-right">
            <button class="btn-outline" @click="showPage('upload')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Добавить акт
            </button>
            <div class="view-switch">
              <button class="vsw" :class="{ active: actsView === 'grid' }" @click="setView('grid')" title="Сетка (V)">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              </button>
              <button class="vsw" :class="{ active: actsView === 'list' }" @click="setView('list')" title="Список">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- GRID -->
        <div class="acts-grid" :class="{ hidden: actsView !== 'grid' }">
          <div class="act-card" v-for="a in filteredActs" :key="a.id" @click="openActDetailById(a.id)">
            <div class="ac-top">
              <span class="ac-type">{{ a.type }}</span>
              <span class="ac-vers-pill">{{ a.versions }} {{ pl(a.versions,'версия','версии','версий') }}</span>
            </div>
            <div class="ac-title">{{ a.title }}</div>
            <div class="ac-org">{{ a.org }}</div>
            <div class="ac-info-row">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="12" height="12"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <span>{{ a.date }}</span>
              <span style="margin:0 3px;color:var(--bg3)">·</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="12" height="12"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.31 3.58-6 8-6s8 2.69 8 6"/></svg>
              <span>{{ a.updatedBy }}</span>
            </div>
            <div class="ac-footer">
              <button class="btn-outline" style="font-size:12px;padding:5px 12px" @click.stop="openActDetailById(a.id)">Подробнее</button>
              <button class="dots-btn" @click.stop="showCtx($event, a.id)">···</button>
            </div>
          </div>
        </div>

        <!-- LIST -->
        <div class="acts-list" :class="{ hidden: actsView !== 'list' }">
          <div class="act-row" v-for="a in filteredActs" :key="a.id" @click="openActDetailById(a.id)">
            <div class="ar-type"><span class="ac-type">{{ a.type }}</span></div>
            <div class="ar-title">{{ a.title }}</div>
            <div class="ar-org">{{ a.org }}</div>
            <div class="ar-date">{{ a.date }}</div>
            <div class="ar-vers" style="font-size:12px;color:var(--faint)">{{ a.versions }} {{ pl(a.versions,'версия','версии','версий') }}</div>
            <div class="ar-author" style="font-size:12px;color:var(--muted)">{{ a.updatedBy }}</div>
            <button class="dots-btn" @click.stop="showCtx($event, a.id)">···</button>
          </div>
        </div>

        <div class="acts-pagination">
          <span>Показано 1–{{ filteredActs.length }} из {{ filteredActs.length }}</span>
          <div class="pg-btns">
            <button class="pg-b" @click="showToast('Пагинация ← (требуется backend)')">‹</button>
            <button class="pg-b" @click="showToast('Пагинация → (требуется backend)')">›</button>
          </div>
        </div>
      </div>

      <!-- ══════ PAGE: ACT DETAIL ══════ -->
      <div class="page" :class="{ hidden: page !== 'act-detail' }">
        <div class="page-topnav">
          <button class="topnav-btn" @click="showPage('acts')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>
            Назад
          </button>
        </div>
        <div class="detail-header">
          <div>
            <h1 class="detail-title">{{ detailAct ? detailAct.title : '' }}</h1>
            <p class="detail-sub">{{ detailAct ? detailAct.org + ' · ' + detailAct.versions + ' версий' : '' }}</p>
          </div>
          <div class="detail-header-actions">
            <button class="btn-dark" @click="showPage('compare-table')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="9" height="18" rx="1"/><rect x="13" y="3" width="9" height="18" rx="1"/></svg>
              Сравнить версии
            </button>
            <button class="btn-outline" @click="showPage('chain')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
              Цепочка редакций
            </button>
          </div>
        </div>

        <div class="toolbar" style="margin-bottom:12px">
          <div class="search-box">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/></svg>
            <input class="search-input" type="text" placeholder="Фильтровать версии..."/>
          </div>
          <div class="filter-chips">
            <button class="fchip active">Все</button>
            <button class="fchip">Актуальные</button>
            <button class="fchip">Архив</button>
          </div>
          <button class="btn-dark" style="margin-left:auto"
                  :disabled="checkedVersions.length !== 2"
                  :style="checkedVersions.length !== 2 ? 'opacity:0.45;cursor:not-allowed' : ''"
                  @click="compareSelectedVersions">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="9" height="18" rx="1"/><rect x="13" y="3" width="9" height="18" rx="1"/></svg>
            Сравнить выбранные
            <span v-if="checkedVersions.length > 0" style="background:rgba(255,255,255,0.2);border-radius:10px;padding:1px 7px;font-size:11px;margin-left:2px">{{ checkedVersions.length }}/2</span>
          </button>
        </div>

        <div class="versions-tbl">
          <div class="vtbl-head">
            <div><input type="checkbox" @change="selectAllVersions($event)"/></div>
            <div>Версия</div><div>Дата</div><div>Автор</div><div>Изменений</div><div>Размер</div><div>Статус</div><div></div>
          </div>
          <div class="vtbl-row" v-for="v in versionRows" :key="v.num">
            <div @click.stop><input type="checkbox" class="v-check" v-model="v.checked"/></div>
            <div class="vtbl-ver">{{ v.num }}</div>
            <div>{{ v.date }}</div>
            <div>{{ v.author }}</div>
            <div class="vtbl-changes">{{ v.changes > 0 ? v.changes + ' изм.' : '—' }}</div>
            <div class="vtbl-size">{{ v.size }}</div>
            <div><span class="vtbl-status" :class="v.status === 'Актуальная' ? 'status-act' : 'status-arch'">{{ v.status }}</span></div>
            <div><button class="dots-btn" @click.stop="showToast('Версия ' + v.num + ': действия')">···</button></div>
          </div>
        </div>

        <!-- Прогресс анализа версий -->
        <div style="margin:16px 20px 0" :class="{ hidden: !versionCompareRunning }">
          <div style="display:flex;align-items:flex-start;gap:16px;background:var(--white);border:1px solid var(--border);border-radius:var(--r2);padding:20px 24px">
            <div style="width:40px;height:40px;background:var(--bg2);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
            </div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600;margin-bottom:12px">{{ versionCompareLabel }}</div>
              <div class="progress-bar" style="margin-bottom:10px"><div class="progress-fill" :style="{ width: versionComparePct + '%' }"></div></div>
              <div class="progress-steps">
                <span class="ps" v-for="(s,i) in progressSteps" :key="i"
                      :class="{ active: versionCompareStep === i, done: versionCompareStep > i }">{{ s }}</span>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- ══════ PAGE: UPLOAD ══════ -->
      <div class="page" :class="{ hidden: page !== 'upload' }">
        <div class="upload-wrap">
          <div class="upload-hero">
            <h1 class="upload-h1">Сравнение редакций НПА</h1>
            <p class="upload-sub">Загрузите две версии нормативного акта — AI выявит структурные и семантические изменения и проверит соответствие законодательству Республики Беларусь</p>
          </div>

          <div class="upload-pair">
            <!-- Старая версия -->
            <div class="upload-card">
              <div class="uc-hdr"><h3>Старая версия</h3><p>Загрузите предыдущую редакцию правового акта</p></div>
              <div v-if="!files.old" class="dz" :class="{ over: dzOldOver }"
                   @dragover.prevent="dzOldOver=true" @dragleave="dzOldOver=false"
                   @drop.prevent="onDrop($event,'old')" @click="$refs.fiOld.click()">
                <div class="dz-icon">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16,16 12,12 8,16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                </div>
                <p class="dz-text">Перетащите файл или нажмите для поиска</p>
                <p class="dz-hint">Только DOCX и PDF файлы</p>
                <button class="dz-btn" @click.stop="$refs.fiOld.click()">Смотреть файлы</button>
                <input type="file" ref="fiOld" accept=".docx,.pdf" style="display:none" @change="onFileSelect($event,'old')"/>
              </div>
              <div v-else class="fp">
                <div class="fp-ico">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
                </div>
                <div>
                  <div class="fp-name">{{ files.old.name }}</div>
                  <div class="fp-size">{{ Math.round(files.old.size/1024) }} KB</div>
                </div>
                <button class="fp-rm" @click="removeFile('old')">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
            </div>

            <div class="upload-sep">
              <div class="sep-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
              </div>
            </div>

            <!-- Новая версия -->
            <div class="upload-card">
              <div class="uc-hdr"><h3>Новая версия</h3><p>Загрузите обновлённую редакцию документа</p></div>
              <div v-if="!files.new" class="dz" :class="{ over: dzNewOver }"
                   @dragover.prevent="dzNewOver=true" @dragleave="dzNewOver=false"
                   @drop.prevent="onDrop($event,'new')" @click="$refs.fiNew.click()">
                <div class="dz-icon">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16,16 12,12 8,16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                </div>
                <p class="dz-text">Перетащите файл или нажмите для поиска</p>
                <p class="dz-hint">Только DOCX и PDF файлы</p>
                <button class="dz-btn" @click.stop="$refs.fiNew.click()">Смотреть файлы</button>
                <input type="file" ref="fiNew" accept=".docx,.pdf" style="display:none" @change="onFileSelect($event,'new')"/>
              </div>
              <div v-else class="fp">
                <div class="fp-ico">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
                </div>
                <div>
                  <div class="fp-name">{{ files.new.name }}</div>
                  <div class="fp-size">{{ Math.round(files.new.size/1024) }} KB</div>
                </div>
                <button class="fp-rm" @click="removeFile('new')">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
            </div>
          </div>

          <button class="btn-compare" :disabled="compareRunning" @click="startCompare">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
            Сравнить редакции
          </button>

          <!-- Progress -->
          <div class="progress-wrap" :class="{ hidden: !compareRunning }">
            <div class="progress-label">{{ progressLabel }}</div>
            <div class="progress-bar"><div class="progress-fill" :style="{ width: progressPct + '%' }"></div></div>
            <div class="progress-steps">
              <span class="ps" v-for="(s,i) in progressSteps" :key="i"
                    :class="{ active: progressStep === i, done: progressStep > i }">{{ s }}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- ══════ PAGE: COMPARE TABLE ══════ -->
      <div class="page" :class="{ hidden: page !== 'compare-table' }">
        <div class="cmp-header">
          <div>
            <h1 class="cmp-title">{{ compareTitle }}</h1>
            <p class="cmp-sub">{{ compareSub }}</p>
          </div>
          <div class="cmp-header-actions">
            <button class="btn-outline" @click="exportDocx">

      <h4>Статья 218. Стандартные налоговые вычеты</h4>
      <p>4) налоговый вычет за каждый месяц налогового периода распространяется на родителя, супруга родителя, усыновителя, на обеспечении которых находится ребёнок, в следующих размерах:</p>
      <p>1 <span class="vadd" data-risk="green" data-sec="П.4.1" data-type="Изменение суммы" data-law="—" data-rec="Повышает прозрачность">400</span> рублей на первого ребёнка;</p>
      <p>1 400 рублей на второго ребёнка;</p>
      <p>3 000 рублей на третьего и каждого последующего ребёнка;</p>
      <p>12 000 рублей на каждого ребёнка-инвалида или учащегося очной формы до 24 лет, если инвалид I–II группы;</p>
      <p><span class="vadd" data-risk="green" data-sec="Статья 12" data-type="Добавление субъекта" data-law="—" data-rec="Проверить корректность распределения">налоговый вычет распространяется на опекуна, попечителя, приёмного родителя на обеспечении которых находится ребёнок:</span></p>
      <p>1 400 рублей на первого ребёнка;</p>
      <p>1 400 рублей на второго ребёнка;</p>
      <p>6 000 рублей на каждого ребёнка-инвалида;</p>`;

    function onVtvClick(e) {
      const el = e.target.closest('[data-risk]');
      if (!el) { vtvBarVisible.value = false; return; }
      vtvBar.risk = el.dataset.risk;
      vtvBar.sec  = el.dataset.sec;
      vtvBar.type = el.dataset.type;
      vtvBar.law  = el.dataset.law;
      vtvBar.rec  = el.dataset.rec;
      vtvBarVisible.value = true;
      e.stopPropagation();
    }

    /* ── HIERARCHY & VIOLATIONS ── */
    const hierarchy = HIERARCHY_DATA;
    const violations = VIOLATIONS_DATA;

    /* ── CHAIN ── */
    const chainVersions = CHAIN_VERSIONS_DATA;

    function chainDotClass(risk) {
      return { red: 'ct-dot-r', orange: 'ct-dot-o', green: 'ct-dot-g' }[risk] || 'ct-dot-g';
    }

    function chainSegW(v, key) {
      const w = (v.red + v.org + v.grn) || 1;
      return Math.round(v[key] / w * 60);
    }

    const chainSvgHtml = computed(() => {
      const W=400, H=180, PAD={t:20,r:20,b:30,l:30};
      const cw=W-PAD.l-PAD.r, ch=H-PAD.t-PAD.b;
      const data=[...CHAIN_VERSIONS_DATA].reverse();
      const maxY=Math.max(...data.map(d=>d.red+d.org+d.grn))||10;
      const xs=data.map((_,i)=>PAD.l+(i/(data.length-1))*cw);
      const lineR=data.map((d,i)=>`${xs[i]},${PAD.t+ch-(d.red/maxY)*ch}`).join(' ');
      const lineO=data.map((d,i)=>`${xs[i]},${PAD.t+ch-(d.org/maxY)*ch}`).join(' ');
      const lineG=data.map((d,i)=>`${xs[i]},${PAD.t+ch-(d.grn/maxY)*ch}`).join(' ');
      const labels=data.map((d,i)=>`<text x="${xs[i]}" y="${H-5}" text-anchor="middle" font-size="10" fill="#a1a1aa">${d.ver}</text>`).join('');
      const gridY=[0,.25,.5,.75,1].map(f=>{const y=PAD.t+ch*(1-f);return `<line x1="${PAD.l}" y1="${y}" x2="${W-PAD.r}" y2="${y}" stroke="#e4e4e7" stroke-width="1"/>`;}).join('');
      const dots=data.map((d,i)=>`
        <circle cx="${xs[i]}" cy="${PAD.t+ch-(d.grn/maxY)*ch}" r="3.5" fill="#22c55e"/>
        <circle cx="${xs[i]}" cy="${PAD.t+ch-(d.org/maxY)*ch}" r="3.5" fill="#f97316"/>
        <circle cx="${xs[i]}" cy="${PAD.t+ch-(d.red/maxY)*ch}" r="3.5" fill="#ef4444"/>
      `).join('');
      return `${gridY}
        <polyline points="${lineG}" fill="none" stroke="#22c55e" stroke-width="2" stroke-linejoin="round"/>
        <polyline points="${lineO}" fill="none" stroke="#f97316" stroke-width="2" stroke-linejoin="round"/>
        <polyline points="${lineR}" fill="none" stroke="#ef4444" stroke-width="2" stroke-linejoin="round"/>
        ${dots}${labels}`;
    });

    /* ── ASSISTANT ── */
    const chatStarted = ref(false);
    const chatMessages = ref([]);
    const assInput = ref('');
    const activeChatId = ref(0);
    const assMsgs = ref(null);
    const assTA = ref(null);

    const chatHistory = ref([
      { title: 'Анализ ПИТР v2' },
      { title: 'Проверка ст.45 Закона' },
      { title: 'Сравнение НК РБ 2024' },
      { title: 'Декрет №4 изменения' },
      { title: 'ТК РБ ст.73 анализ' },
    ]);

    const suggestions = [
      'Объясни изменение в п.2.4',
      'Какие риски в новой редакции?',
      'Найди противоречия с ТК РБ',
      'Сформируй юридическое заключение',
      'Проверь соответствие Конституции РБ',
      'Проанализируй цепочку редакций',
    ];

    function newChat() {
      chatStarted.value = false;
      chatMessages.value = [];
    }

    function sugSend(text) {
      assInput.value = text;
      assSend();
    }

    function assKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); assSend(); }
    }

    function assResize() {
      nextTick(() => {
        const el = assTA.value;
        if (el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 130) + 'px'; }
      });
    }

    function getMockReply(t) {
      const l = t.toLowerCase();
      if (l.includes('п.2.4') || l.includes('объясни'))
        return 'П.2.4: замена «имеет право» → «обязан» меняет норму с диспозитивной на императивную. Согласно ч.1 ст.55 ТК РБ, это требует обоснования в пояснительной записке.';
      if (l.includes('риск'))
        return '3 критических риска:\n1. П.2.4 — нарушение ст.55 ТК РБ\n2. Раздел III — удаление обязательной процедуры (Закон №130-З)\n3. П.8.1 — нарушение ст.73 ТК РБ';
      if (l.includes('противоречи') || l.includes('тк'))
        return 'Противоречия с ТК РБ:\n• П.2.4 — ст.55 ТК РБ (нарушение прав работника)\n• П.8.1 — ст.73 ТК РБ (периодичность выплат не реже 2 раз/мес)';
      if (l.includes('заключени'))
        return 'Юридическое заключение:\n\nНовая редакция ПВТР ООО «ТехПром» содержит 3 нормы, противоречащих законодательству РБ. Акт не может быть введён в действие без устранения нарушений в пп. 2.4, 8.1 и восстановления Раздела III.\n\nОснования: ст.55, ст.73 ТК РБ; Закон №130-З.';
      if (l.includes('конституци'))
        return 'Соответствие Конституции РБ: нарушений не выявлено. Изменения находятся в рамках ст.41–43 Конституции.';
      if (l.includes('цепочк') || l.includes('редакци'))
        return 'Цепочка редакций v1→v5:\n• 27 изменений суммарно\n• Тенденция: ужесточение обязанностей работника\n• Наибольший риск: v5 (3 противоречия)\n• Рекомендую: откатить изменения п.2.4 и п.8.1';
      return 'Анализирую запрос... Для точного ответа подключите Claude API с контекстом базы НПА Республики Беларусь.';
    }

    function assSend() {
      const text = assInput.value.trim();
      if (!text) return;
      chatStarted.value = true;
      assInput.value = '';
      if (assTA.value) { assTA.value.style.height = 'auto'; }

      chatMessages.value.push({ role: 'user', html: esc(text), typing: false });
      const typingId = chatMessages.value.length;
      chatMessages.value.push({ role: 'ai', html: '', typing: true });

      nextTick(() => {
        if (assMsgs.value) assMsgs.value.scrollTop = assMsgs.value.scrollHeight;
      });

      setTimeout(() => {
        chatMessages.value[typingId] = { role: 'ai', html: esc(getMockReply(text)), typing: false };
        nextTick(() => {
          if (assMsgs.value) assMsgs.value.scrollTop = assMsgs.value.scrollHeight;
        });
      }, 900 + Math.random() * 500);
    }

    /* ── CTX MENU ── */
    const ctxVisible = ref(false);
    const ctxX = ref(0);
    const ctxY = ref(0);

    function showCtx(e, id) {
      e.stopPropagation();
      ctxId.value = id;
      ctxX.value = Math.min(e.clientX, window.innerWidth - 170);
      ctxY.value = Math.min(e.clientY, window.innerHeight - 180);
      ctxVisible.value = true;
    }

    function closeCtx() { ctxVisible.value = false; }

    function ctxAction(action) {
      const id = ctxId.value;
      closeCtx();
      if (action === 'view')    openActDetailById(id);
      if (action === 'compare') showPage('upload');
      if (action === 'chain')   showPage('chain');
      if (action === 'export')  showToast('Экспорт акта #' + id + ' (требуется backend)');
      if (action === 'delete') {
        const a = ACTS_DATA.find(x => x.id === id);
        modalDelText.value = 'Удалить «' + (a?.title) + '»? Это действие необратимо.';
        modalDel.value = true;
      }
    }

    /* ── TOAST ── */
    const toastVisible = ref(false);
    const toastMsg = ref('');
    let toastTimer = null;

    function showToast(msg) {
      toastMsg.value = msg;
      toastVisible.value = true;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toastVisible.value = false; }, CFG.TOAST_MS);
    }

    /* ── MODALS ── */
    const modalDel = ref(false);
    const modalDelText = ref('Это действие необратимо. Все версии и результаты анализа будут удалены.');
    const modalNtsi = ref(false);
    const modalShortcuts = ref(false);
    const ntsiQuery = ref('');
    const ntsiTypeRef = ref('all');

    function openNtsiModal() {
      modalNtsi.value = true;
      nextTick(() => { const el = document.querySelector('[ref=ntsiInput]'); if (el) el.focus(); });
    }

    function ntsiSearch() {
      const q = ntsiQuery.value.trim();
      if (!q) { showToast('Введите поисковый запрос'); return; }
      window.open('https://pravo.by/search/?c=&text=' + encodeURIComponent(q) + '&q=&l=', '_blank', 'noopener');
      modalNtsi.value = false;
    }

    function openNtsi() { window.open('https://pravo.by', '_blank', 'noopener'); }

    function openShortcuts() { modalShortcuts.value = true; }

    function confirmDelete() {
      modalDel.value = false;
      showToast('✓ Акт удалён (требуется backend)');
    }

    function exportDocx() {
      showToast('📄 Экспорт .docx (требуется backend)');
    }

    function shareReport() {
      navigator.clipboard.writeText(window.location.href).then(() => showToast('✓ Ссылка скопирована'));
    }

    /* ── UTILS (методы-хелперы для шаблона) ── */
    function barSegClass(c) {
      return { r:'bs-r', o:'bs-o', g:'bs-g', e:'bs-e' }[c] || 'bs-e';
    }

    /* ── KEYBOARD ── */
    let kbSeq = '';
    let kbTimer = null;

    function handleKbd(e) {
      const tag = document.activeElement?.tagName?.toLowerCase();
      if (['input','textarea','select'].includes(tag)) return;

      if (e.key === 'Escape') {
        modalDel.value = false; modalNtsi.value = false; modalShortcuts.value = false;
        closeCtx(); return;
      }
      if (e.ctrlKey && e.key === 'k') { e.preventDefault(); openNtsiModal(); return; }
      if (e.ctrlKey && e.key === 'e') { e.preventDefault(); exportDocx(); return; }

      switch (e.key) {
        case '?': openShortcuts(); return;
        case 'n': case 'N': showPage('upload'); return;
        case 'v': case 'V': if (page.value === 'acts') setView(actsView.value === 'grid' ? 'list' : 'grid'); return;
        case 'd': case 'D': if (page.value === 'compare-table') tableDense.value = !tableDense.value; return;
        case '/': document.getElementById('acts-search')?.focus(); e.preventDefault(); return;
        case '1': if (page.value === 'compare-table') tblRisk.value = 'all'; return;
        case '2': if (page.value === 'compare-table') tblRisk.value = 'red'; return;
        case '3': if (page.value === 'compare-table') tblRisk.value = 'orange'; return;
        case '4': if (page.value === 'compare-table') tblRisk.value = 'green'; return;
      }

      if (e.key === 'g' || e.key === 'G') {
        kbSeq = 'g'; clearTimeout(kbTimer); kbTimer = setTimeout(() => kbSeq = '', 1000); return;
      }
      if (kbSeq === 'g') {
        kbSeq = '';
        if (e.key === 'a' || e.key === 'A') showPage('acts');
        if (e.key === 'u' || e.key === 'U') showPage('upload');
        if (e.key === 'i' || e.key === 'I') showPage('assistant');
        if (e.key === 'c' || e.key === 'C') showPage('chain');
      }
    }

    function handleDocClick(e) {
      if (!e.target.closest('.ctx-menu') && !e.target.closest('.dots-btn')) closeCtx();
      if (!e.target.closest('.vtv-bar') && !e.target.closest('.vdel') && !e.target.closest('.vadd')) {
        vtvBarVisible.value = false;
      }
    }

    onMounted(() => {
      document.addEventListener('keydown', handleKbd);
      document.addEventListener('click', handleDocClick);
      document.addEventListener('mousemove', onAuthMouse);
    });

    onUnmounted(() => {
      document.removeEventListener('keydown', handleKbd);
      document.removeEventListener('click', handleDocClick);
      document.removeEventListener('mousemove', onAuthMouse);
    });

    return {
      /* auth */
      isAuthenticated, currentUser, logOut,
      authMode, authLoading, authShake, showPw,
      authForm, authErr, authBlobStyle, authPwStrength, authPwClass,
      setAuthMode, submitAuth,
      /* router */
      page, showPage,
      /* sidebar */
      sgWorkspace, sgProj1, mobSidebarOpen, toggleMobSidebar,
      /* acts */
      acts, actsView, actsTypeFilter, actsRiskFilter, actsSearch,
      filteredActs, onActsSearchInput, filterActsType, filterActsRisk, setView,
      /* detail */
      compareTitle, compareSub,
      detailAct, versionRows, checkedVersions, compareSelectedVersions,
      versionCompareRunning, versionComparePct, versionCompareLabel, versionCompareStep,
      selectAllVersions, openActDetailById,
      /* upload */
      files, dzOldOver, dzNewOver, compareRunning,
      progressPct, progressLabel, progressStep, progressSteps,
      onDrop, onFileSelect, removeFile, startCompare,
      /* compare */
      cmpTab, tblSearch, tblRisk, tableDense, perPage, sortState,
      filteredChanges, tblSummaryText, sortTable,
      /* vtv */
      vtvOldHtml, vtvNewHtml, vtvBarVisible, vtvBar, onVtvClick,
      /* check */
      hierarchy, violations,
      /* chain */
      chainVersions, chainDotClass, chainSegW, chainSvgHtml,
      /* assistant */
      chatStarted, chatMessages, assInput, activeChatId, chatHistory, suggestions, assMsgs, assTA,
      newChat, sugSend, assKey, assResize, assSend,
      /* ctx */
      ctxVisible, ctxX, ctxY, showCtx, ctxAction,
      /* toast */
      toastVisible, toastMsg, showToast,
      /* modals */
      modalDel, modalDelText, modalNtsi, modalShortcuts,
      ntsiQuery, ntsiTypeRef,
      openNtsiModal, ntsiSearch, openNtsi, openShortcuts,
      confirmDelete, exportDocx, shareReport,
      /* utils */
      rBdg, rLbl, rFull, pl, barSegClass,
    };
  }
};

createApp(App).mount('#app');

  </script>
</body>
